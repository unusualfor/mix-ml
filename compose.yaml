services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: cocktailuser
      POSTGRES_PASSWORD: cocktail
      POSTGRES_DB: cocktails
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocktailuser -d cocktails"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mix-internal

  backend:
    image: ghcr.io/unusualfor/mix-ml-backend:v1.0.0
    container_name: mix-ml-backend
    environment:
      DATABASE_URL: "postgresql+psycopg://cocktailuser:cocktail@postgres:5432/cocktails"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mix-internal
      - caddy

  frontend:
    image: ghcr.io/unusualfor/mix-ml-frontend:v1.0.0
    container_name: mix-ml-frontend
    environment:
      BACKEND_URL: "http://backend:8080"
    depends_on:
      - backend
    networks:
      - mix-internal
      - caddy

networks:
  mix-internal:
    driver: bridge
  caddy:
    external: true

volumes:
  pgdata: