# Podman / Docker Compose — local development & website deployment
# Usage:  podman compose up -d
#         podman compose down

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: cocktailuser
      POSTGRES_PASSWORD: cocktail
      POSTGRES_DB: cocktails
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro,Z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocktailuser -d cocktails"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql+psycopg://cocktailuser:cocktail@postgres:5432/cocktails"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: "http://backend:8080"
    depends_on:
      - backend

  caddy:
    image: docker.io/library/caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
