apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-bot-role
  namespace: mix-ml-ci
  labels:
    app.kubernetes.io/part-of: cocktail-platform
    app.kubernetes.io/component: ci
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-bot-binding
  namespace: mix-ml-ci
  labels:
    app.kubernetes.io/part-of: cocktail-platform
    app.kubernetes.io/component: ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-bot-role
subjects:
  - kind: ServiceAccount
    name: pipeline-bot
    namespace: mix-ml-ci
