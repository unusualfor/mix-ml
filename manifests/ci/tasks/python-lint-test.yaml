# Lint + test Python code for any app in the mono-repo.
# Reusable across backend and frontend via the app-path param.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: python-lint-test
  namespace: mix-ml-ci
  labels:
    app.kubernetes.io/part-of: cocktail-platform
    app.kubernetes.io/component: ci
spec:
  params:
    - name: app-path
      type: string
      default: backend
      description: Subdirectory containing the Python app (e.g. backend, frontend)
  workspaces:
    - name: source
      description: Cloned repo workspace
  steps:
    - name: install-deps
      image: registry.access.redhat.com/ubi9/python-311:latest
      workingDir: "$(workspaces.source.path)"
      env:
        - name: APP_PATH
          value: "$(params.app-path)"
      script: |
        #!/usr/bin/env bash
        set -eu
        python -m venv /tmp/venv
        source /tmp/venv/bin/activate
        pip install --no-cache-dir -e "${APP_PATH}/[dev]"
        pip install --no-cache-dir ruff || echo "ruff not installable, will skip lint"

    - name: lint
      image: registry.access.redhat.com/ubi9/python-311:latest
      workingDir: "$(workspaces.source.path)"
      env:
        - name: APP_PATH
          value: "$(params.app-path)"
      script: |
        #!/usr/bin/env bash
        set -eu
        source /tmp/venv/bin/activate
        if command -v ruff &>/dev/null; then
          echo "=== Running ruff on ${APP_PATH}/ ==="
          ruff check "${APP_PATH}/" --output-format=text || true
        else
          echo "ruff not available — lint skipped"
        fi

    - name: test
      image: registry.access.redhat.com/ubi9/python-311:latest
      workingDir: "$(workspaces.source.path)/$(params.app-path)"
      script: |
        #!/usr/bin/env bash
        set -eu
        source /tmp/venv/bin/activate
        echo "=== Running pytest ==="
        pytest tests/ -v --tb=short 2>&1 || {
          echo "Tests failed"
          exit 1
        }
