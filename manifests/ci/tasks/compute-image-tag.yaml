# Reads the HEAD commit SHA from the cloned workspace and outputs
# a short image tag in the form "git-<7-char-sha>".
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: compute-image-tag
  namespace: mix-ml-ci
  labels:
    app.kubernetes.io/part-of: cocktail-platform
    app.kubernetes.io/component: ci
spec:
  results:
    - name: image-tag
      description: "Image tag: git-<short-sha>"
    - name: short-sha
      description: "Short SHA (7 chars)"
  workspaces:
    - name: source
      description: Cloned repo workspace
  steps:
    - name: compute
      image: registry.access.redhat.com/ubi9-minimal:latest
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/usr/bin/env sh
        set -eu
        SHA=$(cat .git/refs/heads/main 2>/dev/null || cat .git/HEAD | awk '{print $2}' | xargs -I{} cat ".git/{}" 2>/dev/null || git rev-parse HEAD)
        SHORT=$(echo "$SHA" | cut -c1-7)
        TAG="git-${SHORT}"
        printf "%s" "$TAG" > "$(results.image-tag.path)"
        printf "%s" "$SHORT" > "$(results.short-sha.path)"
        echo "Image tag: $TAG"
