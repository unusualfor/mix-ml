apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mix-ml

labels:
  - pairs:
      app.kubernetes.io/part-of: cocktail-platform
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

resources:
  - namespace.yaml
  # postgres-secret.yaml removed — managed out-of-band by setup-secrets.sh
  # ArgoCD RespectIgnoreDifferences was not preventing sync overwrite.
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - frontend-route.yaml
  - seed-job.yaml

configMapGenerator:
  - name: postgres-seed
    files:
      - seed.sql

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/unusualfor/mix-ml-backend
    newTag: v1.0.0
  - name: ghcr.io/unusualfor/mix-ml-frontend
    newTag: v1.0.0
