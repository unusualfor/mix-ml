<div id="bottle-{{ bottle.id }}" class="bottle-card rounded-lg border border-slate-200 bg-white p-4 transition-all hover:border-amber-400 hover:shadow-sm cursor-pointer{% if not bottle.on_hand %} opacity-60{% endif %}"
     hx-get="/inventory/{{ bottle.id }}/profile"
     hx-target="this"
     hx-swap="outerHTML">
  <div class="flex items-start justify-between gap-2">
    <div class="min-w-0">
      <p class="font-medium text-slate-900 truncate">{{ bottle.brand }}</p>
      <p class="text-sm text-slate-600 truncate">{{ bottle.label or "—" }}</p>
      <p class="text-xs text-slate-500">{{ bottle.class_name }}</p>
    </div>
    <div class="shrink-0 text-right">
      {% if bottle.abv is not none %}
      <span class="text-xs text-slate-500">{{ bottle.abv }}%</span>
      {% endif %}
    </div>
  </div>
  {% if not bottle.on_hand %}
  <span class="mt-2 inline-block rounded bg-slate-200 px-2 py-0.5 text-xs text-slate-600">out of stock</span>
  {% endif %}
</div>
